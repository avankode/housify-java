spring:
  config:
    import: "optional:application-secrets.yml"
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/housify_main_db}
    username: ${DB_USERNAME:housify_admin}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}

logging:
  level:
    root: WARN
    com.example.demo: INFO
    org.springframework.web.servlet.DispatcherServlet: WARN
    org.springframework.security: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss z} %highlight(%-5level) %cyan(%logger{25}) - %msg%n"
