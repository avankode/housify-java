spring:
  config:
    import: ""
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update

server:
  forward-headers-strategy: native

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS}
  frontend:
    url: ${FRONTEND_URL}
